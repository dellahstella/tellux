<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tellux — Logo v7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2A3530;display:flex;align-items:center;justify-content:center;min-height:100vh}
</style>
</head>
<body>

<svg viewBox="0 0 400 560" width="400" height="560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Corps matériel du T (partie haute, au-dessus de l'horizon) -->
    <linearGradient id="solid" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F5EACC"/>
      <stop offset="60%" stop-color="#E8D8A0"/>
      <stop offset="100%" stop-color="#D4B870"/>
    </linearGradient>

    <!-- Reflet éthérique (partie basse, sous l'horizon) -->
    <linearGradient id="ether" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E8D8A0" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#D4B870" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#C0A050" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Horizon lumineux -->
    <linearGradient id="hz" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF4DC" stop-opacity="0"/>
      <stop offset="18%" stop-color="#F5E8C8" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#FFFCF0" stop-opacity="1"/>
      <stop offset="82%" stop-color="#F5E8C8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFF4DC" stop-opacity="0"/>
    </linearGradient>

    <!-- Courbe basse éthérique -->
    <linearGradient id="hz-eth" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5E8C8" stop-opacity="0"/>
      <stop offset="20%" stop-color="#E8D4A0" stop-opacity="0.30"/>
      <stop offset="50%" stop-color="#FFF4DC" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#E8D4A0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#F5E8C8" stop-opacity="0"/>
    </linearGradient>

    <!-- Halo central (entre les deux courbes = l'oeil) -->
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8E8" stop-opacity="0.40"/>
      <stop offset="40%" stop-color="#EDCF88" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C0A050" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur-s"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur-m"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur-eth"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- PARTIE HAUTE : LE T-BOUCLIER (matériel, net, solide)  -->
  <!-- Barre = bouclier. Angles descendants = gothique.       -->
  <!-- Fût élancé = lame / clou                               -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- Barre horizontale — angles descendants = la forme bouclier -->
  <path d="M 72 82
           L 328 82
           L 328 104
           L 290 108
           Q 258 112 242 128
           Q 230 142 226 162
           L 226 300
           L 174 300
           L 174 162
           Q 170 142 158 128
           Q 142 112 110 108
           L 72 104
           Z"
        fill="url(#solid)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- LIGNE D'HORIZON — courbe convexe vers le haut         -->
  <!-- Séparée, structurelle — courbure de la Terre           -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- Trait principal -->
  <path d="M 80 310 Q 200 280 320 310"
        fill="none"
        stroke="url(#hz)"
        stroke-width="2"
        stroke-linecap="round"/>
  <!-- Halo de l'horizon -->
  <path d="M 80 310 Q 200 280 320 310"
        fill="none"
        stroke="url(#hz)"
        stroke-width="10"
        stroke-linecap="round"
        opacity="0.25"
        filter="url(#blur-s)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- ENTRE LES DEUX COURBES : espace lumineux = l'OEIL     -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- Halo doux entre horizon et courbe basse -->
  <ellipse cx="200" cy="370" rx="100" ry="55"
           fill="url(#eye-glow)"/>
  <!-- Noyau lumineux sur l'axe -->
  <ellipse cx="200" cy="368" rx="40" ry="20"
           fill="#FFF8E8" opacity="0.15"
           filter="url(#blur-s)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- PARTIE BASSE : REFLET ÉTHÉRIQUE                        -->
  <!-- Le fût du T continue, mais flou, vibratoire             -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- Fût éthérique — miroir flou du montant -->
  <path d="M 174 310
           L 174 370
           Q 173 410 184 440
           Q 192 458 200 465
           Q 208 458 216 440
           Q 227 410 226 370
           L 226 310
           Z"
        fill="url(#ether)"
        filter="url(#blur-eth)"/>

  <!-- Couche plus subtile encore -->
  <path d="M 180 315
           L 180 365
           Q 180 405 190 435
           Q 196 450 200 456
           Q 204 450 210 435
           Q 220 405 220 365
           L 220 315
           Z"
        fill="url(#ether)"
        opacity="0.6"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- COURBE BASSE — symétrique inversée de l'horizon        -->
  <!-- Convexe vers le BAS. Éthérique, vibratoire.            -->
  <!-- Ne touche pas l'horizon. Ensemble = oeil.              -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- Trait éthérique -->
  <path d="M 105 430 Q 200 458 295 430"
        fill="none"
        stroke="url(#hz-eth)"
        stroke-width="1.8"
        stroke-linecap="round"/>
  <!-- Halo vibratoire -->
  <path d="M 105 430 Q 200 458 295 430"
        fill="none"
        stroke="url(#hz-eth)"
        stroke-width="12"
        stroke-linecap="round"
        opacity="0.20"
        filter="url(#blur-m)"/>
  <!-- Deuxième pulsation plus diffuse -->
  <path d="M 120 435 Q 200 460 280 435"
        fill="none"
        stroke="url(#hz-eth)"
        stroke-width="6"
        stroke-linecap="round"
        opacity="0.12"
        filter="url(#blur-m)"/>

</svg>

</body>
</html>
